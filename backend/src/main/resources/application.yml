server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: opl-backend
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/${MYSQL_DB:opl_platform}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:root123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:redis123456}
      database: 0
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd'T'HH:mm:ssXXX
    serialization:
      write-dates-as-timestamps: false
  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 300MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      id-type: auto

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

security:
  jwt:
    secret: ${JWT_SECRET:opl-platform-super-secret-key-change-this-please}
    expire-minutes: 720
  mfa:
    required: true
    issuer: Project Issue Hub
    digits: 6
    step-seconds: 30
    window: 1

wechat:
  miniapp:
    mock-enabled: ${WECHAT_MINIAPP_MOCK_ENABLED:true}
    app-id: ${WECHAT_MINIAPP_APP_ID:}
    secret: ${WECHAT_MINIAPP_SECRET:}

storage:
  minio:
    endpoint: ${MINIO_ENDPOINT:http://127.0.0.1:9000}
    public-endpoint: ${MINIO_PUBLIC_ENDPOINT:${MINIO_ENDPOINT:http://127.0.0.1:9000}}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin123}
    bucket: ${MINIO_BUCKET:opl-attachments}

report:
  public-base-url: ${REPORT_PUBLIC_BASE_URL:http://localhost}
